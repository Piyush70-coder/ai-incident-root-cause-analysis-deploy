{% extends 'base.html' %}

{% block page_title %}Log Viewer - {{ log.file_name }}{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto space-y-6">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-2">
        <div>
            <h1 class="text-xl sm:text-2xl font-bold text-white tracking-tight flex items-start sm:items-center gap-3">
                <i data-lucide="terminal" class="w-6 h-6 text-indigo-400 shrink-0"></i>
                <span class="break-all">{{ log.file_name }}</span>
            </h1>
            <p class="text-slate-400 text-sm mt-1 flex flex-wrap items-center gap-2">
                <span class="px-2 py-0.5 rounded bg-slate-900 border border-slate-800 text-[10px] font-mono text-slate-300">{{ log.file_size|filesizeformat }}</span>
                <span class="px-2 py-0.5 rounded bg-slate-900 border border-slate-800 text-[10px] font-mono text-slate-300">{{ log.file_type }}</span>
            </p>
        </div>
        <a href="{% url 'incident_detail' log.incident.id %}" class="w-full sm:w-auto justify-center px-4 py-2.5 rounded-xl bg-slate-900 border border-slate-800 text-sm font-semibold text-slate-300 hover:text-white hover:bg-slate-800 transition-all flex items-center">
            <i data-lucide="arrow-left" class="w-4 h-4 mr-2"></i> Back to Incident
        </a>
    </div>

    <div class="card-saas overflow-hidden border-indigo-500/20 shadow-xl shadow-slate-950/50">
        <div class="bg-slate-950/80 p-4 sm:p-6 overflow-x-auto relative">
            <pre class="log-content safe-pre-wrap text-xs sm:text-sm text-slate-300 font-mono leading-relaxed"><code>{{ content }}</code></pre>
        </div>
    </div>
</div>

<style>
.log-content { max-height: 75vh; overflow-y: auto; }
.log-content code { display: block; counter-reset: line; }
.log-content code:before {
    counter-increment: line; content: counter(line); display: inline-block;
    width: 2.5em; padding-right: 0.5em; margin-right: 1em; color: #475569;
    text-align: right; border-right: 1px solid #1e293b;
}
@media (min-width: 640px) {
    .log-content code:before {
        width: 3.5em; padding-right: 1em; margin-right: 1.5em;
    }
}
/* Custom scrollbar for logs */
.log-content::-webkit-scrollbar { width: 8px; height: 8px; }
.log-content::-webkit-scrollbar-track { background: #020617; }
.log-content::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
.log-content::-webkit-scrollbar-thumb:hover { background: #334155; }
</style>
{% endblock %}
