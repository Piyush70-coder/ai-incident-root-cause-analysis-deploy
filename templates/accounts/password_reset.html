{% extends 'base.html' %}

{% block title %}Reset Password - Incident Management{% endblock %}
{% block public_content %}
<div class="w-full max-w-full overflow-x-hidden">
    <div class="mb-5 sm:mb-8 text-center">
        <h2 class="text-xl sm:text-2xl font-bold text-white tracking-tight">Reset Password</h2>
        <p class="text-slate-400 text-xs sm:text-sm mt-1">Enter your email and we’ll send a secure reset link.</p>
    </div>

    <form class="space-y-4 sm:space-y-5" method="post">
        {% csrf_token %}
        <div class="space-y-2">
            <label for="email" class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest pl-1">Email Address</label>
            <input id="email" name="email" type="email" required class="w-full bg-slate-900/50 border border-slate-800 rounded-xl px-4 py-2.5 sm:py-3 text-sm text-white placeholder-slate-600 focus:outline-none focus:border-indigo-500/50 focus:ring-2 focus:ring-indigo-500/20 transition-all" placeholder="Enter your email">
        </div>
        <div class="flex justify-start pt-1">
            <a href="{% url 'login' %}" class="text-xs font-bold text-indigo-400 hover:text-indigo-300 uppercase tracking-widest transition-colors">
                Back to Login
            </a>
        </div>
        <button type="submit" class="btn-saas-primary w-full py-3 sm:py-3.5 shadow-indigo-500/20">
            Send Reset Link
        </button>
    </form>
    </div>
</div>
{% endblock %}
