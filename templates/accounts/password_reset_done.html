{% extends 'base.html' %}

{% block title %}Reset Link Sent - Incident Management{% endblock %}
{% block public_content %}
<div class="w-full max-w-full overflow-x-hidden text-center">
    <div class="mx-auto w-12 h-12 bg-emerald-500/15 border border-emerald-500/30 rounded-xl flex items-center justify-center mb-4">
        <svg class="w-6 h-6 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
    </div>
    <h2 class="text-xl sm:text-2xl font-bold text-white tracking-tight">Check your inbox</h2>
    <p class="mt-2 text-xs sm:text-sm text-slate-400">
        We sent reset instructions if an account exists for that email.
    </p>
    <p class="mt-3 text-xs sm:text-sm text-slate-500">
        If you don’t see it soon, check your spam folder.
    </p>
    <div class="mt-6 sm:mt-8">
        <a href="{% url 'login' %}" class="btn-saas-primary w-full py-3 sm:py-3.5 shadow-indigo-500/20 justify-center">
            Return to Login
        </a>
    </div>
</div>
{% endblock %}
